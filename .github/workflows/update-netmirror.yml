name: Sync NetMirror

on:
schedule:
- cron: '0 */6 * * *'
workflow_dispatch:

jobs:
sync:
runs-on: ubuntu-latest

permissions:
  contents: write

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Download latest netmirror.js
    run: |
      mkdir -p providers
      curl -L \
        https://raw.githubusercontent.com/D3adlyRocket/All-in-One-Nuvio/main/providers/netmirror.js \
        -o providers/netmirror.js

  - name: Commit changes
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"
      git add providers/netmirror.js
      git diff --cached --quiet || git commit -m "Auto update NetMirror"

  - name: Push changes
    run: |
      git push origin main
