name: Sync NetMirror

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Download latest netmirror.js
        run: |
          mkdir -p providers
          curl -L \
         https://github.com/D3adlyRocket/All-in-One-Nuvio/blob/main/providers/netmirror.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add providers/netmirror.js
          git diff --cached --quiet || git commit -m "Auto update NetMirror"

      - name: Push changes
        run: |
          git push
